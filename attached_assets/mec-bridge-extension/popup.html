<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>MEC Agent Bridge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: 'Segoe UI', monospace, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 20px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #39ff14;
      box-shadow: 0 0 6px #39ff14;
    }
    h1 { font-size: 14px; font-weight: 700; color: #39ff14; letter-spacing: 0.08em; text-transform: uppercase; }
    p { font-size: 12px; color: #888; margin-bottom: 16px; line-height: 1.5; }
    label { font-size: 11px; color: #aaa; display: block; margin-bottom: 4px; letter-spacing: 0.05em; text-transform: uppercase; }
    input {
      width: 100%;
      background: #111;
      border: 1px solid #222;
      border-radius: 4px;
      padding: 8px 10px;
      color: #e0e0e0;
      font-size: 12px;
      margin-bottom: 12px;
      outline: none;
    }
    input:focus { border-color: #39ff14; }
    input::placeholder { color: #444; }
    button {
      width: 100%;
      background: #39ff14;
      color: #000;
      border: none;
      border-radius: 4px;
      padding: 10px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    button:hover { background: #2ecc10; }
    button:disabled { background: #1a3a0a; color: #333; cursor: not-allowed; }
    .status {
      margin-top: 12px;
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 4px;
      display: none;
    }
    .status.success { background: #0a2a0a; border: 1px solid #39ff14; color: #39ff14; display: block; }
    .status.error { background: #2a0a0a; border: 1px solid #ff3333; color: #ff5555; display: block; }
    .status.info { background: #0a1a2a; border: 1px solid #3399ff; color: #66aaff; display: block; }
    .wallet-count { font-size: 24px; font-weight: 700; color: #39ff14; text-align: center; margin: 8px 0 4px; }
    .wallet-label { font-size: 11px; color: #666; text-align: center; }
    hr { border: none; border-top: 1px solid #1a1a1a; margin: 14px 0; }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-dot"></div>
    <h1>MEC Agent Bridge</h1>
  </div>

  <p>Export your Meta Earth wallets to the MEC Agent Ops dashboard.</p>

  <label>Dashboard URL</label>
  <input type="text" id="dashboardUrl" placeholder="https://your-replit-app.replit.app" />

  <label>Encryption Password</label>
  <input type="password" id="password" placeholder="Password to encrypt mnemonics in agent" />

  <label>Network</label>
  <input type="text" id="network" value="mainnet" />

  <button id="exportBtn">Export Wallets to Agent</button>

  <div class="status" id="status"></div>

  <div id="debugInfo" style="display:none; margin-top:10px; font-size:10px; color:#666; background:#0d0d0d; border:1px solid #1a1a1a; border-radius:4px; padding:8px 10px; word-break:break-all; white-space:pre-wrap; line-height:1.6;"></div>

  <script src="popup.js"></script>
</body>
</html>
