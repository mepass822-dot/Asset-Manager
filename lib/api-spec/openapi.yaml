openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Meta Earth Wallet Agent API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: wallets
    description: Wallet management
  - name: agent
    description: AI agent operations
  - name: rules
    description: Agent automation rules
  - name: whitelist
    description: Destination address whitelist

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /wallets:
    get:
      operationId: listWallets
      tags: [wallets]
      summary: List all wallets
      responses:
        "200":
          description: List of wallets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Wallet"
    post:
      operationId: createWallet
      tags: [wallets]
      summary: Add a wallet (mnemonic encrypted and stored)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletInput"
      responses:
        "201":
          description: Wallet created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
        "400":
          description: Invalid input

  /wallets/{id}:
    get:
      operationId: getWallet
      tags: [wallets]
      summary: Get a wallet by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
        "404":
          description: Not found
    delete:
      operationId: deleteWallet
      tags: [wallets]
      summary: Remove a wallet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /wallets/{id}/balance:
    get:
      operationId: getWalletBalance
      tags: [wallets]
      summary: Fetch live MEC balance from blockchain
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Balance info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletBalance"
        "404":
          description: Not found

  /wallets/{id}/transactions:
    get:
      operationId: getWalletTransactions
      tags: [wallets]
      summary: Fetch on-chain transaction history for a wallet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 25
      responses:
        "200":
          description: Transaction list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletTransactionList"
        "404":
          description: Not found

  /wallets/{id}/staking-rewards:
    get:
      operationId: getWalletStakingRewards
      tags: [wallets]
      summary: Fetch pending (withdrawable) staking / block rewards for a wallet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Staking rewards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletStakingRewards"
        "404":
          description: Not found

  /wallets/bulk-import:
    post:
      operationId: bulkImportWallets
      tags: [wallets]
      summary: Import multiple wallets from a block of mnemonic phrases
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkImportInput"
      responses:
        "200":
          description: Import summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportResult"
        "400":
          description: Invalid input

  /agent/sweep-config:
    get:
      operationId: getSweepConfig
      tags: [agent]
      summary: Get the current sweep configuration (master address, auto-sweep settings)
      responses:
        "200":
          description: Sweep config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SweepConfig"
    post:
      operationId: updateSweepConfig
      tags: [agent]
      summary: Update the sweep configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SweepConfigInput"
      responses:
        "200":
          description: Updated sweep config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SweepConfig"

  /agent/run:
    post:
      operationId: runAgent
      tags: [agent]
      summary: Trigger the AI agent to evaluate and execute actions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentRunInput"
      responses:
        "200":
          description: Agent run result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunResult"

  /agent/chat:
    post:
      operationId: agentChat
      tags: [agent]
      summary: Chat with the NVIDIA-powered agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentChatInput"
      responses:
        "200":
          description: Agent response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentChatResult"

  /agent/scheduler:
    get:
      operationId: getScheduler
      tags: [agent]
      summary: Get scheduler status
      responses:
        "200":
          description: Scheduler status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchedulerStatus"
    post:
      operationId: startScheduler
      tags: [agent]
      summary: Start or reconfigure the agent scheduler
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SchedulerInput"
      responses:
        "200":
          description: Scheduler started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchedulerStatus"
        "400":
          description: Invalid input
    delete:
      operationId: stopScheduler
      tags: [agent]
      summary: Stop the agent scheduler
      responses:
        "200":
          description: Scheduler stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchedulerStatus"

  /agent/logs:
    get:
      operationId: listAgentLogs
      tags: [agent]
      summary: Get agent activity logs
      parameters:
        - name: walletId
          in: query
          schema:
            type: ["integer", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Agent logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentLog"

  /agent/stats:
    get:
      operationId: getAgentStats
      tags: [agent]
      summary: Get agent summary stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentStats"

  /rules:
    get:
      operationId: listRules
      tags: [rules]
      summary: List automation rules
      responses:
        "200":
          description: Rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rule"
    post:
      operationId: createRule
      tags: [rules]
      summary: Create an automation rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleInput"
      responses:
        "201":
          description: Rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rule"

  /rules/{id}:
    patch:
      operationId: updateRule
      tags: [rules]
      summary: Update a rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleUpdate"
      responses:
        "200":
          description: Updated rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rule"
        "404":
          description: Not found
    delete:
      operationId: deleteRule
      tags: [rules]
      summary: Delete a rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /whitelist:
    get:
      operationId: listWhitelist
      tags: [whitelist]
      summary: List all whitelisted destination addresses
      responses:
        "200":
          description: Whitelist entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WhitelistEntry"
    post:
      operationId: createWhitelistEntry
      tags: [whitelist]
      summary: Add an address to the whitelist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WhitelistInput"
      responses:
        "201":
          description: Entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhitelistEntry"
        "400":
          description: Invalid input
        "409":
          description: Address already whitelisted

  /whitelist/{id}:
    delete:
      operationId: deleteWhitelistEntry
      tags: [whitelist]
      summary: Remove an address from the whitelist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Wallet:
      type: object
      required: [id, label, address, network, createdAt]
      properties:
        id:
          type: integer
        label:
          type: string
        address:
          type: string
        network:
          type: string
        verified:
          type: boolean
        importSource:
          type: string
        createdAt:
          type: string
          format: date-time

    WalletInput:
      type: object
      required: [label, password, network]
      properties:
        label:
          type: string
          minLength: 1
        mnemonic:
          type: string
          minLength: 1
        privateKey:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
        network:
          type: string
          default: mainnet

    WalletBalance:
      type: object
      required: [walletId, address, balance, denom]
      properties:
        walletId:
          type: integer
        address:
          type: string
        balance:
          type: string
        denom:
          type: string
        usdValue:
          type: ["string", "null"]

    AgentRunInput:
      type: object
      required: [walletIds, masterPassword]
      properties:
        walletIds:
          type: array
          items:
            type: integer
        masterPassword:
          type: string
        dryRun:
          type: boolean
          default: false

    AgentRunResult:
      type: object
      required: [executed, skipped, logs]
      properties:
        executed:
          type: integer
        skipped:
          type: integer
        logs:
          type: array
          items:
            $ref: "#/components/schemas/AgentLog"

    AgentChatInput:
      type: object
      required: [message]
      properties:
        message:
          type: string
        walletContext:
          type: ["boolean", "null"]

    AgentChatResult:
      type: object
      required: [reply]
      properties:
        reply:
          type: string
        suggestedActions:
          type: array
          items:
            type: string

    AgentLog:
      type: object
      required: [id, action, status, message, createdAt]
      properties:
        id:
          type: integer
        walletId:
          type: ["integer", "null"]
        walletLabel:
          type: ["string", "null"]
        action:
          type: string
        status:
          type: string
        txHash:
          type: ["string", "null"]
        amount:
          type: ["string", "null"]
        message:
          type: string
        createdAt:
          type: string
          format: date-time

    AgentStats:
      type: object
      required: [totalWallets, totalWithdrawals, successfulWithdrawals, failedWithdrawals, activeRules]
      properties:
        totalWallets:
          type: integer
        verifiedWallets:
          type: integer
        totalWithdrawals:
          type: integer
        successfulWithdrawals:
          type: integer
        failedWithdrawals:
          type: integer
        activeRules:
          type: integer
        lastRunAt:
          type: ["string", "null"]

    WalletStakingRewards:
      type: object
      required: [walletId, address, rewards, totalMEC, totalUMec]
      properties:
        walletId:
          type: integer
        address:
          type: string
        rewards:
          type: array
          items:
            type: object
            required: [validatorAddress, amount, amountRaw]
            properties:
              validatorAddress:
                type: string
              amount:
                type: string
              amountRaw:
                type: string
        totalMEC:
          type: string
        totalUMec:
          type: string

    BulkImportInput:
      type: object
      required: [mnemonics, password]
      properties:
        mnemonics:
          type: string
          description: One mnemonic phrase per line (12 or 24 words each)
        password:
          type: string
          minLength: 1
        network:
          type: string
          default: mainnet

    BulkImportResult:
      type: object
      required: [total, verified, unverified, skipped]
      properties:
        total:
          type: integer
        verified:
          type: integer
        unverified:
          type: integer
        skipped:
          type: integer
        wallets:
          type: object
          properties:
            verified:
              type: array
              items:
                type: object
                properties:
                  address:
                    type: string
                  label:
                    type: string
                  walletId:
                    type: integer
            unverified:
              type: array
              items:
                type: object
                properties:
                  address:
                    type: string
                  label:
                    type: string
                  walletId:
                    type: integer
        skippedDetails:
          type: array
          items:
            type: object
            properties:
              reason:
                type: string
              phrase:
                type: string

    SweepConfig:
      type: object
      required: [id, masterAddress, enabled, autoClaimStaking, dividendWindowDays, minSweepAmountMec]
      properties:
        id:
          type: integer
        masterAddress:
          type: string
        enabled:
          type: boolean
        autoClaimStaking:
          type: boolean
        dividendWindowDays:
          type: integer
        minSweepAmountMec:
          type: string
        updatedAt:
          type: string
          format: date-time

    SweepConfigInput:
      type: object
      properties:
        masterAddress:
          type: string
        enabled:
          type: boolean
        autoClaimStaking:
          type: boolean
        dividendWindowDays:
          type: integer
        minSweepAmountMec:
          type: string

    Rule:
      type: object
      required: [id, name, ruleType, enabled, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        ruleType:
          type: string
        enabled:
          type: boolean
        conditionJson:
          type: ["string", "null"]
        actionJson:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    RuleInput:
      type: object
      required: [name, ruleType]
      properties:
        name:
          type: string
          minLength: 1
        ruleType:
          type: string
        enabled:
          type: boolean
          default: true
        conditionJson:
          type: string
        actionJson:
          type: string

    SchedulerStatus:
      type: object
      required: [enabled, walletIds, dryRun]
      properties:
        enabled:
          type: boolean
        intervalMs:
          type: ["integer", "null"]
        walletIds:
          type: array
          items:
            type: integer
        dryRun:
          type: boolean
        nextRunAt:
          type: ["string", "null"]
        lastRunAt:
          type: ["string", "null"]
        lastRunResult:
          type: ["object", "null"]
          properties:
            executed:
              type: integer
            skipped:
              type: integer

    SchedulerInput:
      type: object
      required: [intervalMs, walletIds, masterPassword]
      properties:
        intervalMs:
          type: integer
          minimum: 60000
        walletIds:
          type: array
          items:
            type: integer
        masterPassword:
          type: string
        dryRun:
          type: boolean
          default: true

    RuleUpdate:
      type: object
      properties:
        name:
          type: string
        enabled:
          type: boolean
        conditionJson:
          type: string
        actionJson:
          type: string

    WalletTransaction:
      type: object
      required: [txHash, height, timestamp, direction, amount, amountRaw, counterpart, memo, success]
      properties:
        txHash:
          type: string
        height:
          type: integer
        timestamp:
          type: string
        direction:
          type: string
          enum: [sent, received]
        amount:
          type: string
        amountRaw:
          type: string
        counterpart:
          type: string
        memo:
          type: string
        success:
          type: boolean

    WalletTransactionList:
      type: object
      required: [walletId, address, transactions]
      properties:
        walletId:
          type: integer
        address:
          type: string
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/WalletTransaction"

    WhitelistEntry:
      type: object
      required: [id, address, label, createdAt]
      properties:
        id:
          type: integer
        address:
          type: string
        label:
          type: string
        createdAt:
          type: string
          format: date-time

    WhitelistInput:
      type: object
      required: [address, label]
      properties:
        address:
          type: string
          minLength: 1
        label:
          type: string
          minLength: 1
